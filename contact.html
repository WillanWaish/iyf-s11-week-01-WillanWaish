 <form action="submit-contact" method="post">
  <fieldset>
    <legend>Contact Information</legend>
  <p>
  <label for="contact-subject">Reason for contact:</label><br>
  <select id="contact-subject" name="subject" required aria-required="true">
    <option value="" disabled selected>Please select a reason</option>
    <option value="general">General Inquiry</option>
    <option value="support">Support Request</option>
    <option value="feedback">Feedback</option>
    </select>
  </p>
  <p>
  <label for="contact-message">Message (minimum 50 words required):</label><br>
  <textarea
    id="contact-message"
    name="message"
    rows="8"
    cols="60" 
    required aria-required="true"></textarea>
    placeholder="Please enter your message here. Minimum 50 words required."></textarea>
  </p>
  </fieldset>
  <button type="submit">send message</button>
  </form>
</section>
